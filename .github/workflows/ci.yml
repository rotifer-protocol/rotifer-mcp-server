name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm test

  gitleaks:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cross-contamination:
    name: Cross-Contamination Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for private file paths
        run: |
          CONTAMINATED=$(git log --all --diff-filter=A --name-only --format="" | grep "^internal/" | sort -u || true)
          if [ -n "$CONTAMINATED" ]; then
            echo "::error::⛔ CRITICAL: private files found in commit history!"
            echo "$CONTAMINATED"
            exit 1
          fi
          echo "✅ No contamination detected"

  report-quality:
    name: Report to Quality Observatory
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build

      - name: Run tests with JSON reporter
        run: npx vitest run --reporter=json --outputFile=test-results.json 2>/dev/null || true

      - name: Report test results to Supabase
        if: env.QUALITY_SUPABASE_URL != ''
        env:
          QUALITY_SUPABASE_URL: ${{ secrets.QUALITY_SUPABASE_URL }}
          QUALITY_SUPABASE_KEY: ${{ secrets.QUALITY_SUPABASE_SERVICE_KEY }}
        run: |
          if [ ! -f test-results.json ]; then exit 0; fi
          VERSION=$(node -p "require('./package.json').version")
          TOTAL=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).numTotalTests || 0")
          PASSED=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).numPassedTests || 0")
          FAILED=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).numFailedTests || 0")
          DURATION=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).testResults?.reduce((s,r) => s + (r.endTime - r.startTime), 0) || 0")
          curl -s -X POST "${QUALITY_SUPABASE_URL}/rest/v1/release_test_reports" \
            -H "apikey: ${QUALITY_SUPABASE_KEY}" \
            -H "Authorization: Bearer ${QUALITY_SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"version\":\"v${VERSION}\",\"component\":\"mcp\",\"total_tests\":${TOTAL},\"passed\":${PASSED},\"failed\":${FAILED},\"duration_ms\":${DURATION},\"ci_run_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            && echo "✅ Reported" || echo "⚠️ Report failed (non-blocking)"
