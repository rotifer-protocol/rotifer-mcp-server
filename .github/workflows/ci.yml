name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      ROTIFER_CLOUD_ENDPOINT: https://cloud.rotifer.dev
      ROTIFER_CLOUD_ANON_KEY: ${{ secrets.ROTIFER_CLOUD_ANON_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Checkout rotifer-playground for local inventory tests
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: rotifer-protocol/rotifer-playground
          path: rotifer-playground
          fetch-depth: 1
      - name: Assert live test dependencies on protected branches
        run: |
          test -d rotifer-playground/genes
          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ] && [ -z "${ROTIFER_CLOUD_ANON_KEY}" ]; then
            echo "::error::ROTIFER_CLOUD_ANON_KEY is required for live Cloud tests on push/workflow runs"
            exit 1
          fi
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm run test:coverage
      - name: Run live cloud integration tests
        if: github.event_name != 'pull_request'
        run: npm run test:live

  gitleaks:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "stable"
      - name: Install gitleaks CLI
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Run gitleaks
        run: |
          "$(go env GOPATH)/bin/gitleaks" git . --config .gitleaks.toml --no-banner --redact

  cross-contamination:
    name: Cross-Contamination Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Scan for private file paths
        run: |
          CONTAMINATED=$(git log --all --diff-filter=A --name-only --format="" | grep "^internal/" | sort -u || true)
          if [ -n "$CONTAMINATED" ]; then
            echo "::error::⛔ CRITICAL: private files found in commit history!"
            echo "$CONTAMINATED"
            exit 1
          fi
          echo "✅ No contamination detected"

  security-report:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - run: npm ci

      - name: Report security + dependency audit
        if: env.QUALITY_SUPABASE_URL != ''
        env:
          QUALITY_SUPABASE_URL: ${{ secrets.QUALITY_SUPABASE_URL }}
          QUALITY_SUPABASE_KEY: ${{ secrets.QUALITY_SUPABASE_SERVICE_KEY }}
        run: |
          normalize_version() {
            case "$1" in
              v*) printf '%s' "$1" ;;
              *) printf 'v%s' "$1" ;;
            esac
          }
          VERSION=$(node -p "require('./package.json').version")
          COMPONENT_VERSION=$(normalize_version "${VERSION}")
          RELEASE_LINE_VERSION="${COMPONENT_VERSION}"
          NPM_AUDIT=$(npm audit --json --registry https://registry.npmjs.org/ 2>/dev/null || echo '{}')
          CRITICAL=$(echo "$NPM_AUDIT" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.vulnerabilities?.critical||0}catch{0}")
          HIGH=$(echo "$NPM_AUDIT" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.vulnerabilities?.high||0}catch{0}")
          MODERATE=$(echo "$NPM_AUDIT" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.vulnerabilities?.moderate||0}catch{0}")
          LOW=$(echo "$NPM_AUDIT" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.vulnerabilities?.low||0}catch{0}")
          TOTAL=$(echo "$NPM_AUDIT" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.dependencies?.total||0}catch{0}")
          VULNERABLE_DEPS=$((CRITICAL + HIGH + MODERATE + LOW))
          GRADE="PASS"
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then GRADE="FAIL"; fi
          curl -s -X POST "${QUALITY_SUPABASE_URL}/rest/v1/security_scan_results" \
            -H "apikey: ${QUALITY_SUPABASE_KEY}" -H "Authorization: Bearer ${QUALITY_SUPABASE_KEY}" \
            -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d "{\"version\":\"${COMPONENT_VERSION}\",\"release_line_version\":\"${RELEASE_LINE_VERSION}\",\"component\":\"mcp\",\"scan_type\":\"npm_audit\",\"grade\":\"${GRADE}\",\"severity_counts\":{\"critical\":${CRITICAL},\"high\":${HIGH},\"moderate\":${MODERATE},\"low\":${LOW}},\"source\":\"ci\",\"ci_run_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            && echo "✅ Security scan reported" || echo "⚠️ Report failed"
          curl -s -X POST "${QUALITY_SUPABASE_URL}/rest/v1/dependency_audit_logs" \
            -H "apikey: ${QUALITY_SUPABASE_KEY}" -H "Authorization: Bearer ${QUALITY_SUPABASE_KEY}" \
            -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d "{\"component\":\"mcp\",\"release_line_version\":\"${RELEASE_LINE_VERSION}\",\"ecosystem\":\"npm\",\"total_deps\":${TOTAL},\"vulnerable_deps\":${VULNERABLE_DEPS},\"advisories\":[],\"ci_run_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            && echo "✅ Dependency audit reported" || echo "⚠️ Report failed"

  report-quality:
    name: Report to Quality Observatory
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    env:
      ROTIFER_CLOUD_ENDPOINT: https://cloud.rotifer.dev
      ROTIFER_CLOUD_ANON_KEY: ${{ secrets.ROTIFER_CLOUD_ANON_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Checkout rotifer-playground for local inventory tests
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: rotifer-protocol/rotifer-playground
          path: rotifer-playground
          fetch-depth: 1
      - name: Assert live test dependencies
        run: |
          test -d rotifer-playground/genes
          if [ -z "${ROTIFER_CLOUD_ANON_KEY}" ]; then
            echo "::error::ROTIFER_CLOUD_ANON_KEY is required for quality reporting runs"
            exit 1
          fi
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build

      - name: Run core tests with JSON reporter + coverage
        run: npm run test:coverage -- --reporter=json --outputFile=test-results.json 2>/dev/null || true

      - name: Report core test results to Supabase
        if: env.QUALITY_SUPABASE_URL != ''
        env:
          QUALITY_SUPABASE_URL: ${{ secrets.QUALITY_SUPABASE_URL }}
          QUALITY_SUPABASE_KEY: ${{ secrets.QUALITY_SUPABASE_SERVICE_KEY }}
        run: |
          normalize_version() {
            case "$1" in
              v*) printf '%s' "$1" ;;
              *) printf 'v%s' "$1" ;;
            esac
          }
          if [ ! -f test-results.json ]; then exit 0; fi
          VERSION=$(node -p "require('./package.json').version")
          COMPONENT_VERSION=$(normalize_version "${VERSION}")
          RELEASE_LINE_VERSION="${COMPONENT_VERSION}"
          TOTAL=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).numTotalTests || 0")
          PASSED=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).numPassedTests || 0")
          FAILED=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).numFailedTests || 0")
          SKIPPED=$(node -p "const r=JSON.parse(require('fs').readFileSync('test-results.json','utf8')); (r.numPendingTests || 0) + (r.numTodoTests || 0)")
          DURATION=$(node -p "Math.round(JSON.parse(require('fs').readFileSync('test-results.json','utf8')).testResults?.reduce((s,r) => s + (r.endTime - r.startTime), 0) || 0)")
          COVERAGE_PCT=0
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE_PCT=$(node -p "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8')).total?.lines?.pct || 0")
          fi
          if curl --fail-with-body -sS -X POST "${QUALITY_SUPABASE_URL}/rest/v1/release_test_reports" \
            -H "apikey: ${QUALITY_SUPABASE_KEY}" \
            -H "Authorization: Bearer ${QUALITY_SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"version\":\"${COMPONENT_VERSION}\",\"release_line_version\":\"${RELEASE_LINE_VERSION}\",\"component\":\"mcp\",\"test_type\":\"unit\",\"total_tests\":${TOTAL},\"passed\":${PASSED},\"failed\":${FAILED},\"skipped\":${SKIPPED},\"duration_ms\":${DURATION},\"coverage_pct\":${COVERAGE_PCT},\"ci_run_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"; then
            echo "✅ Reported (coverage: ${COVERAGE_PCT}%)"
          else
            echo "::warning::Quality test report upload failed"
          fi

      - name: Run live integration tests with JSON reporter
        run: npm run test:live -- --reporter=json --outputFile=live-results.json 2>/dev/null || true

      - name: Report live integration results to Supabase
        if: env.QUALITY_SUPABASE_URL != ''
        env:
          QUALITY_SUPABASE_URL: ${{ secrets.QUALITY_SUPABASE_URL }}
          QUALITY_SUPABASE_KEY: ${{ secrets.QUALITY_SUPABASE_SERVICE_KEY }}
        run: |
          normalize_version() {
            case "$1" in
              v*) printf '%s' "$1" ;;
              *) printf 'v%s' "$1" ;;
            esac
          }
          if [ ! -f live-results.json ]; then exit 0; fi
          VERSION=$(node -p "require('./package.json').version")
          COMPONENT_VERSION=$(normalize_version "${VERSION}")
          RELEASE_LINE_VERSION="${COMPONENT_VERSION}"
          TOTAL=$(node -p "JSON.parse(require('fs').readFileSync('live-results.json','utf8')).numTotalTests || 0")
          PASSED=$(node -p "JSON.parse(require('fs').readFileSync('live-results.json','utf8')).numPassedTests || 0")
          FAILED=$(node -p "JSON.parse(require('fs').readFileSync('live-results.json','utf8')).numFailedTests || 0")
          SKIPPED=$(node -p "const r=JSON.parse(require('fs').readFileSync('live-results.json','utf8')); (r.numPendingTests || 0) + (r.numTodoTests || 0)")
          DURATION=$(node -p "Math.round(JSON.parse(require('fs').readFileSync('live-results.json','utf8')).testResults?.reduce((s,r) => s + (r.endTime - r.startTime), 0) || 0)")
          if curl --fail-with-body -sS -X POST "${QUALITY_SUPABASE_URL}/rest/v1/release_test_reports" \
            -H "apikey: ${QUALITY_SUPABASE_KEY}" \
            -H "Authorization: Bearer ${QUALITY_SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"version\":\"${COMPONENT_VERSION}\",\"release_line_version\":\"${RELEASE_LINE_VERSION}\",\"component\":\"mcp\",\"test_type\":\"integration\",\"total_tests\":${TOTAL},\"passed\":${PASSED},\"failed\":${FAILED},\"skipped\":${SKIPPED},\"duration_ms\":${DURATION},\"ci_run_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"; then
            echo "✅ Live integration tests reported"
          else
            echo "::warning::Quality live integration report upload failed"
          fi
