name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm test

  gitleaks:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "stable"
      - name: Install gitleaks CLI
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Run gitleaks
        run: |
          "$(go env GOPATH)/bin/gitleaks" git . --no-banner --redact

  cross-contamination:
    name: Cross-Contamination Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Scan for private file paths
        run: |
          CONTAMINATED=$(git log --all --diff-filter=A --name-only --format="" | grep "^internal/" | sort -u || true)
          if [ -n "$CONTAMINATED" ]; then
            echo "::error::⛔ CRITICAL: private files found in commit history!"
            echo "$CONTAMINATED"
            exit 1
          fi
          echo "✅ No contamination detected"

  security-report:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - run: npm ci

      - name: Report security + dependency audit
        if: env.QUALITY_SUPABASE_URL != ''
        env:
          QUALITY_SUPABASE_URL: ${{ secrets.QUALITY_SUPABASE_URL }}
          QUALITY_SUPABASE_KEY: ${{ secrets.QUALITY_SUPABASE_SERVICE_KEY }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NPM_AUDIT=$(npm audit --json --registry https://registry.npmjs.org/ 2>/dev/null || echo '{}')
          CRITICAL=$(echo "$NPM_AUDIT" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.vulnerabilities?.critical||0}catch{0}")
          HIGH=$(echo "$NPM_AUDIT" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.vulnerabilities?.high||0}catch{0}")
          MODERATE=$(echo "$NPM_AUDIT" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.vulnerabilities?.moderate||0}catch{0}")
          LOW=$(echo "$NPM_AUDIT" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.vulnerabilities?.low||0}catch{0}")
          TOTAL=$(echo "$NPM_AUDIT" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.dependencies?.total||0}catch{0}")
          GRADE="PASS"
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then GRADE="FAIL"; fi
          curl -s -X POST "${QUALITY_SUPABASE_URL}/rest/v1/security_scan_results" \
            -H "apikey: ${QUALITY_SUPABASE_KEY}" -H "Authorization: Bearer ${QUALITY_SUPABASE_KEY}" \
            -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d "{\"version\":\"v${VERSION}\",\"component\":\"mcp\",\"scan_type\":\"npm_audit\",\"grade\":\"${GRADE}\",\"severity_counts\":{\"critical\":${CRITICAL},\"high\":${HIGH},\"moderate\":${MODERATE},\"low\":${LOW}},\"source\":\"ci\",\"ci_run_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            && echo "✅ Security scan reported" || echo "⚠️ Report failed"
          curl -s -X POST "${QUALITY_SUPABASE_URL}/rest/v1/dependency_audit_logs" \
            -H "apikey: ${QUALITY_SUPABASE_KEY}" -H "Authorization: Bearer ${QUALITY_SUPABASE_KEY}" \
            -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d "{\"component\":\"mcp\",\"audit_tool\":\"npm_audit\",\"total_deps\":${TOTAL},\"vulnerabilities\":{\"critical\":${CRITICAL},\"high\":${HIGH},\"moderate\":${MODERATE},\"low\":${LOW}},\"ci_run_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            && echo "✅ Dependency audit reported" || echo "⚠️ Report failed"

  report-quality:
    name: Report to Quality Observatory
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build

      - name: Run tests with JSON reporter + coverage
        run: npx vitest run --reporter=json --outputFile=test-results.json --coverage 2>/dev/null || true

      - name: Report test results to Supabase
        if: env.QUALITY_SUPABASE_URL != ''
        env:
          QUALITY_SUPABASE_URL: ${{ secrets.QUALITY_SUPABASE_URL }}
          QUALITY_SUPABASE_KEY: ${{ secrets.QUALITY_SUPABASE_SERVICE_KEY }}
        run: |
          if [ ! -f test-results.json ]; then exit 0; fi
          VERSION=$(node -p "require('./package.json').version")
          TOTAL=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).numTotalTests || 0")
          PASSED=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).numPassedTests || 0")
          FAILED=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).numFailedTests || 0")
          DURATION=$(node -p "JSON.parse(require('fs').readFileSync('test-results.json','utf8')).testResults?.reduce((s,r) => s + (r.endTime - r.startTime), 0) || 0")
          COVERAGE_PCT=0
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE_PCT=$(node -p "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8')).total?.lines?.pct || 0")
          fi
          curl -s -X POST "${QUALITY_SUPABASE_URL}/rest/v1/release_test_reports" \
            -H "apikey: ${QUALITY_SUPABASE_KEY}" \
            -H "Authorization: Bearer ${QUALITY_SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"version\":\"v${VERSION}\",\"component\":\"mcp\",\"test_type\":\"unit\",\"total_tests\":${TOTAL},\"passed\":${PASSED},\"failed\":${FAILED},\"duration_ms\":${DURATION},\"coverage_pct\":${COVERAGE_PCT},\"ci_run_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            && echo "✅ Reported (coverage: ${COVERAGE_PCT}%)" || echo "⚠️ Report failed (non-blocking)"
