name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "npm package version to publish (e.g. 0.8.6)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: validate
    environment: npm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "Release version is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure package.json version matches release version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "package.json version ($PKG_VERSION) does not match release version (${{ steps.version.outputs.version }})" >&2
            exit 1
          fi

      - name: Check whether version already exists on npm
        id: npm_check
        run: |
          if npm view "@rotifer/mcp-server@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.npm_check.outputs.already_published != 'true'
        run: npm publish --access public --provenance

      - name: Skip publish when version already exists
        if: steps.npm_check.outputs.already_published == 'true'
        run: echo "Package version already exists on npm; skipping publish."

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: "Rotifer MCP Server v${{ steps.version.outputs.version }}"
          body: |
            ## Rotifer MCP Server v${{ steps.version.outputs.version }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Install
            ```bash
            npm install -g @rotifer/mcp-server@${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}

  publish-mcp-registry:
    name: Publish to Official MCP Registry
    runs-on: ubuntu-latest
    needs: [validate, publish]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "Release version is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure server.json version matches release version
        run: |
          SERVER_VERSION="$(node -p "require('./server.json').version")"
          PACKAGE_VERSION="$(node -p "require('./server.json').packages.find((pkg) => pkg.identifier === '@rotifer/mcp-server')?.version")"
          if [ "$SERVER_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "server.json version ($SERVER_VERSION) does not match release version (${{ steps.version.outputs.version }})" >&2
            exit 1
          fi
          if [ "$PACKAGE_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "server.json package version ($PACKAGE_VERSION) does not match release version (${{ steps.version.outputs.version }})" >&2
            exit 1
          fi

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Publish server metadata
        run: |
          mcp-publisher validate
          mcp-publisher login github-oidc
          mcp-publisher publish
