name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: validate
    environment: npm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Check whether version already exists on npm
        id: npm_check
        run: |
          if npm view "@rotifer/mcp-server@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.npm_check.outputs.already_published != 'true'
        run: npm publish --access public --provenance

      - name: Skip publish when version already exists
        if: steps.npm_check.outputs.already_published == 'true'
        run: echo "Package version already exists on npm; skipping publish."

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: "Rotifer MCP Server v${{ steps.version.outputs.version }}"
          body: |
            ## Rotifer MCP Server v${{ steps.version.outputs.version }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Install
            ```bash
            npm install -g @rotifer/mcp-server@${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
